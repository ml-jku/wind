# @package _global_

defaults:
  - override /data: era5_1p5deg

n_timesteps: 5
n_forecast_timesteps: 5
n_spatial_dims: 2
field_channels: 70
timespan_train: ["1979-01-01", "2019-12-31"]
timespan_val: ["2020-01-01", "2020-12-31"]
n_ensembles: 5

noise_distribution:
  _target_: src.modules.fast_fm.sample.distribution.GaussianInitialDistribution
  mean: 0.0
  std: 1.0

logger:
  wandb:
    name: uvit-df
    project: era5

tags: []

trainer:
  max_epochs: 60
  num_sanity_val_steps: 1
  log_every_n_steps: 15
  check_val_every_n_epoch: 2
  gradient_clip_val: 0.8
  precision: bf16-mixed

callbacks:
  model_checkpoint:
    monitor: val/mse_50_temperature
    mode: min
